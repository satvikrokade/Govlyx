version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - TailwindCSS
  - DaisyUI
  - Framer Motion
  - TanStack Query
  - Redux Toolkit
routes:
  - path: /
    file: src/pages/Home.tsx
    auth_required: false
    description: Main dashboard and feed
  - path: /login
    file: src/pages/Login.tsx
    auth_required: false
    description: User authentication login page
  - path: /profile
    file: src/pages/Profile.tsx
    auth_required: true
    description: User profile and activity
  - path: /communities
    file: src/pages/Communities.tsx
    auth_required: true
    description: Community management and feeds
  - path: /post/:id
    file: src/pages/PostDetail.tsx
    auth_required: false
    description: Single post view
features:
  - name: Poll Voting
    description: Users can vote on options in a poll and see real-time results.
    files:
      - src/components/post/PostCard.tsx
      - src/api/postService.ts
    entry_route: /
    user_interactions:
      - Click a poll option to vote
      - See progress bar fill and percentage update
    api_calls:
      - method: POST
        endpoint: /api/polls/{pollId}/vote
    auth_required: true
  - name: Post Interactions
    description: Like, save, and share posts in the feed.
    files:
      - src/components/post/PostCard.tsx
      - src/api/postService.ts
    entry_route: /
    user_interactions:
      - Click heart icon to like
      - Click bookmark icon to save
      - Click share icon to copy link
    api_calls:
      - method: POST
        endpoint: /api/interactions/posts/{id}/like
      - method: POST
        endpoint: /api/interactions/posts/{id}/save
    auth_required: true
  - name: Community Management
    description: Join and participate in local communities.
    files:
      - src/pages/Communities.tsx
      - src/api/communityService.ts
    entry_route: /communities
    user_interactions:
      - Click Join button to join a community
      - Click Leave button to leave
    api_calls:
      - method: POST
        endpoint: /api/communities/{id}/join
      - method: POST
        endpoint: /api/communities/{id}/leave
    auth_required: true
known_limitations: []
